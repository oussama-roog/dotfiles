# Use the xrender backend
backend = "glx";

# Disable blur effects
blur-method = "none";
blur-size = 0;
blur-strength = 0;

# Disable shadows
shadow = false;
shadow-radius = 0;
shadow-opacity = 0.0;
shadow-offset-x = 0;
shadow-offset-y = 0;
shadow-color = "#000000";

# Disable fading effects
fading = false;
fade-in-step = 0.0;
fade-out-step = 0.0;

# Disable detection features
detect-client-opacity = false;
detect-rounded-corners = false;

# Other optional optimizations
# Disable use of GPU acceleration
use-damage = true;
vsync = true;

# Remove any opacity rules or set opacity to 100%
opacity-rule = []

# Set default opacity to 100%
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

# Additional settings for performance
# Increase the interval for screen refreshes (may help performance)
refresh-rate = 60;
