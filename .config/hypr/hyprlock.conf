source = ~/dotfiles/.config/hypr/colors.conf

general {
    grace = 0
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = Oussama is AFK
    text_align = center
    color = rgba($base05)
    font_size = 32
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = NixOS & Neovim btw
    text_align = center
    color = rgba($base0A)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba($base04)
    inner_color = rgba($base00)
    font_color = rgba($base05)
    fade_on_empty = true
    placeholder_text = 
    hide_input = false
    position = 0, 200
    halign = center
    valign = bottom
}
