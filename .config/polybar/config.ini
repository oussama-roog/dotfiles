; vim:ft=dosini
; ──────────────────────────────────────────────
; Polybar — matching waybar aesthetic
; ──────────────────────────────────────────────

include-file = ~/.config/polybar/colors.ini

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 36
fixed-center = true

background = ${colors.base00}
foreground = ${colors.base05}

border-size = 0
line-size = 2
padding-left = 2
padding-right = 2

module-margin-left = 0
module-margin-right = 0

; Font 0: default text (T1)
; Font 1: medium icons (T2)
; Font 2: large icons — nixos logo (T3)
font-0 = "JetBrainsMono Nerd Font Propo:style=Bold:size=11;3"
font-1 = "JetBrainsMono Nerd Font Propo:size=13;4"
font-2 = "JetBrainsMono Nerd Font Propo:size=19;5"

modules-left = nixos sep i3 sep clock sep songname sep xkeyboard
modules-center =
modules-right = bluetooth sep network sep memory sep cpu sep pulseaudio sep battery

tray-position = none
wm-restack = i3
override-redirect = false

cursor-click = pointer
cursor-scroll = ns-resize

; ═══════════════════════════════════════════════
; Formatting
; ═══════════════════════════════════════════════

[module/sep]
type = custom/text
content = "   "
content-foreground = ${colors.base03}

; ═══════════════════════════════════════════════
; Modules — Left
; ═══════════════════════════════════════════════

[module/nixos]
type = custom/text
content = "%{T3}󱄅%{T-}"
content-foreground = ${colors.base0A}

[module/i3]
type = internal/i3
pin-workspaces = false
strip-wsnumbers = false
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = false

format = <label-state> <label-mode>

label-mode = " %mode% "
label-mode-foreground = ${colors.base05}
label-mode-background = ${colors.base03}

; Active workspace
label-focused = " %name% "
label-focused-foreground = ${colors.base0A}
label-focused-background = ${colors.base00}
label-focused-underline = ${colors.base0A}
label-focused-padding = 0

; Inactive workspace
label-unfocused = " %name% "
label-unfocused-foreground = ${colors.base04}
label-unfocused-background = ${colors.base00}
label-unfocused-padding = 0

; Visible on other monitor
label-visible = " %name% "
label-visible-foreground = ${colors.base0A}
label-visible-background = ${colors.base00}
label-visible-padding = 0

; Urgent workspace
label-urgent = " %name% "
label-urgent-foreground = ${colors.base00}
label-urgent-background = ${colors.base08}
label-urgent-underline = ${colors.base08}
label-urgent-padding = 0

[module/clock]
type = internal/date
interval = 60
date = "%{T2}󰃭%{T-}  %a %d, %{T2}󱑆%{T-}  %I:%M %p"
format-foreground = ${colors.base05}

[module/songname]
type = custom/script
exec = ~/.config/waybar/scripts/songname.sh
interval = 1
format-foreground = ${colors.base05}

[module/xkeyboard]
type = internal/xkeyboard
format = "%{T2}󰌌%{T-}  <label-layout>"
format-foreground = ${colors.base05}
label-layout = %name%

; ═══════════════════════════════════════════════
; Modules — Right
; ═══════════════════════════════════════════════


[module/network]
type = internal/network
interface-type = wireless
interval = 5
format-connected = <label-connected>
label-connected = "  %essid% (%signal%%)"
label-connected-foreground = ${colors.base05}
format-disconnected = <label-disconnected>
label-disconnected = "%{T2}󰖪%{T-}  Disconnected"
label-disconnected-foreground = ${colors.base04}

[module/memory]
type = internal/memory
interval = 15
format = <label>
label = "  %used%"
label-foreground = ${colors.base05}

[module/cpu]
type = internal/cpu
interval = 5
format = <label>
label = "󰍛  %percentage%%"
label-foreground = ${colors.base05}

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
interval = 5
format-volume = <ramp-volume>  <label-volume>
label-volume = "%percentage%%"
label-volume-foreground = ${colors.base05}
label-muted = "%{T2}󰖁%{T-}  Muted"
label-muted-foreground = ${colors.base04}
click-right = ~/dotfiles/scripts/vicinae-audio.sh
ramp-volume-0 = "%{T2}󰕿%{T-}"
ramp-volume-1 = "%{T2}󰖀%{T-}"
ramp-volume-2 = "%{T2}󰕾%{T-}"
ramp-volume-foreground = ${colors.base05}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
format-charging = <label-charging>
label-charging = "  %percentage%%"
label-charging-foreground = ${colors.base05}
format-discharging = <ramp-capacity>  <label-discharging>
label-discharging = "%percentage%%"
label-discharging-foreground = ${colors.base05}
format-full = <label-full>
label-full = "  %percentage%%"
label-full-foreground = ${colors.base05}
ramp-capacity-0 = ""
ramp-capacity-1 = ""
ramp-capacity-2 = ""
ramp-capacity-3 = ""
ramp-capacity-4 = ""
ramp-capacity-foreground = ${colors.base05}

[settings]
screenchange-reload = true
